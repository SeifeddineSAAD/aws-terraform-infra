################################################################################
# GitHub Actions - Terraform Apply (runs on merge to main)
################################################################################

name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [dev, staging, prod]
      confirm:
        description: 'Type CONFIRM to proceed'
        required: true

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "eu-west-1"

jobs:
  # ============================================================
  # Auto-apply dev on every merge to main
  # ============================================================
  apply-dev:
    name: 🚀 Apply (dev)
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Apply
        working-directory: environments/dev
        run: |
          terraform apply \
            -var-file="terraform.tfvars" \
            -auto-approve \
            -no-color

  # ============================================================
  # Manual apply to prod (requires confirmation)
  # ============================================================
  apply-prod:
    name: 🏭 Apply (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod' &&
      github.event.inputs.confirm == 'CONFIRM'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: environments/prod
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/prod
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        working-directory: environments/prod
        run: terraform apply tfplan -no-color
